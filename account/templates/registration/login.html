{% extends "base.html" %}

{% block title %}Вход — ScateShopTot{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 border p-4 shadow-sm">
        <h2 class="fw-bold mb-4">ВХОД В АККАУНТ</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-dark rounded-0 w-100">ВОЙТИ</button>
        </form>
        <p class="mt-3 small text-muted">Нет аккаунта? Обратитесь к администратору.</p>
    </div>
</div>
{% endblock %}
